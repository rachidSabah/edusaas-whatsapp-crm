# Cloudflare Pages Configuration for Next.js with D1 Database
# This file configures the deployment for @cloudflare/next-on-pages

name = "edusaas-whatsapp-crm"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# Build output directory - required for @cloudflare/next-on-pages
pages_build_output_dir = ".vercel/output/static"

# D1 Database binding
# Run these commands to create the database:
# wrangler d1 create edusaas-db
# Then copy the database_id below

[[d1_databases]]
binding = "DB"
database_name = "edusaas-db"
database_id = "57dbf83e-7ce3-45e0-b6fa-df2f874c1ae2"

# Environment variables are now managed through D1 database
# No need for TURSO_DATABASE_URL or TURSO_AUTH_TOKEN

# JWT_SECRET can be set in Cloudflare Dashboard if needed
# Go to: Pages > edusaas-whatsapp-crm > Settings > Environment variables
# Optional: JWT_SECRET - for custom JWT signing key
